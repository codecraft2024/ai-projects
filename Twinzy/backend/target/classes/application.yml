spring:
  application:
    name: twinzy-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: 8081

twinzy:
  data-path: ${TWINZY_DATA_PATH:../data/profiles.json}
  face-provider: ${FACE_PROVIDER:mock}
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:3001

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.twinzy: INFO
