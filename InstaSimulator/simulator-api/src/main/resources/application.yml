server:
  port: 8080

spring:
  application:
    name: mobile-simulator-api

simulator:
  base-url: http://localhost:8080
  reports-dir: reports
  auth:
    login-path: /api/v1/auth/login
    refresh-path: /api/v1/auth/refresh
    logout-path: /api/v1/auth/logout
    profile-path: /api/v1/users/me
  timeouts:
    connect-ms: 5000
    read-ms: 30000
  retry:
    max-attempts: 3
    backoff-ms: 500
  stress:
    default-users: 10
    think-time-min-ms: 200
    think-time-max-ms: 1500
    ramp-up-seconds: 5
    duration-seconds: 30
  instapay:
    api-base-url: https://instapaystaging.egyptianbanks.com:5443
