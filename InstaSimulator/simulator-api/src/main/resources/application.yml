    handler: "@qnbpay"
    device-id: "4404f62d1ca7ae83"
    host: qr.instapayqc.egyptianbanks.com
    firebase-special-logging: "y"
    app-id: com.olive.ebc
    health-check-path: /v1/healthCheck/84f7f743-722f-4683-8919-3f95e1f88af5
