services:
  postgres:
    image: postgres:16-alpine
    container_name: ghosttalk-postgres
    environment:
      POSTGRES_DB: ghosttalk
      POSTGRES_USER: ghosttalk
      POSTGRES_PASSWORD: ghosttalk
    ports:
      - "5432:5432"
    volumes:
      - ghosttalk_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghosttalk -d ghosttalk"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ghosttalk-backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/ghosttalk
      DATABASE_USER: ghosttalk
      DATABASE_PASSWORD: ghosttalk
      JWT_SECRET: ghosttalk-dev-secret-change-in-production-min-256-bits-long-key-here
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  ghosttalk_pg_data:
