spring:
  datasource:
    url: jdbc:h2:mem:ghosttalk;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

ghosttalk:
  jwt:
    secret: test-secret-key-for-unit-tests-minimum-256-bits-long-value-here
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
