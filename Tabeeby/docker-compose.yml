services:
  postgres:
    image: postgres:16-alpine
    container_name: tabeeby-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tabeeby}
      POSTGRES_USER: ${POSTGRES_USER:-tabeeby}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tabeeby}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tabeeby} -d ${POSTGRES_DB:-tabeeby}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tabeeby

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: tabeeby-backend
    container_name: tabeeby-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL:-http://localhost:3000}
      TABEEBY_CORS_ALLOWED_ORIGINS_0: ${FRONTEND_PUBLIC_URL:-http://localhost:3000}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-tabeeby}
      POSTGRES_USER: ${POSTGRES_USER:-tabeeby}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tabeeby}
      TABEEBY_UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    restart: unless-stopped
    networks:
      - tabeeby

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${FRONTEND_PUBLIC_URL:-http://localhost:3000}
        NEXT_PUBLIC_API_URL: ${BACKEND_PUBLIC_URL:-http://localhost:8080}
        BACKEND_INTERNAL_URL: http://backend:8080
    image: tabeeby-frontend
    container_name: tabeeby-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_SITE_URL: ${FRONTEND_PUBLIC_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_URL: ${BACKEND_PUBLIC_URL:-http://localhost:8080}
      BACKEND_INTERNAL_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - tabeeby

networks:
  tabeeby:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
