spring:
  application:
    name: patienthub-backend
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  datasource:
    url: jdbc:h2:file:./data/patienthub;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

server:
  port: 8080

patienthub:
  cors:
    allowed-origins:
      - http://localhost:3000
  storage:
    upload-dir: ${PATIENTHUB_UPLOAD_DIR:./uploads}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.patienthub: INFO
    root: INFO
