spring.application.name=tabeeby-backend

spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=30MB

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:tabeeby}
spring.datasource.username=${POSTGRES_USER:tabeeby}
spring.datasource.password=${POSTGRES_PASSWORD:tabeeby}
spring.datasource.driver-class-name=org.postgresql.Driver

server.port=8080

tabeeby.cors.allowed-origins[0]=http://localhost:3000
tabeeby.storage.upload-dir=${TABEEBY_UPLOAD_DIR:./uploads}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

logging.level.com.patienthub=INFO
logging.level.root=INFO
